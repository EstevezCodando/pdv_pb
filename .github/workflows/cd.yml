name: CD e Validacao Pos-Deploy

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package:
    name: Empacotar aplicacao
    runs-on: ubuntu-latest
    outputs:
      artifact-name: pdv-jar-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registrar inicio do empacotamento
        run: bash .github/scripts/registrar-etapa.sh "Iniciando build e empacotamento do artefato"

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Build do artefato
        run: gradle clean build bootJar --stacktrace --warning-mode all

      - name: Upload do executavel
        uses: actions/upload-artifact@v4
        with:
          name: pdv-jar-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 30

      - name: Registrar conclusao do empacotamento
        run: bash .github/scripts/registrar-etapa.sh "Artefato empacotado e publicado com sucesso"

  deploy-and-validate:
    name: Deploy seguro e validacao pos-deploy
    runs-on: ubuntu-latest
    needs: package
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registrar inicio do deploy
        run: bash .github/scripts/registrar-etapa.sh "Iniciando etapa de deploy e validacao pos-deploy"

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Baixar artefato do build
        uses: actions/download-artifact@v4
        with:
          name: pdv-jar-${{ github.sha }}
          path: build/libs

      - name: Registrar estrategia de deploy
        run: bash .github/scripts/registrar-etapa.sh "Preparando deploy controlado e testes pos-deploy"

      - name: Definir URL base do ambiente
        shell: bash
        env:
          SEGREDO_PDV_BASE_URL: ${{ secrets.PDV_BASE_URL }}
        run: |
          if [[ -n "$SEGREDO_PDV_BASE_URL" ]]; then
            echo "PDV_BASE_URL=$SEGREDO_PDV_BASE_URL" >> "$GITHUB_ENV"
            echo "DEPLOY_REMOTO=true" >> "$GITHUB_ENV"
          else
            echo "PDV_BASE_URL=http://127.0.0.1:8080" >> "$GITHUB_ENV"
            echo "DEPLOY_REMOTO=false" >> "$GITHUB_ENV"
          fi

      - name: Executar webhook de deploy remoto
        if: env.DEPLOY_REMOTO == 'true'
        shell: bash
        env:
          SEGREDO_PDV_DEPLOY_WEBHOOK: ${{ secrets.PDV_DEPLOY_WEBHOOK }}
        run: |
          if [[ -z "$SEGREDO_PDV_DEPLOY_WEBHOOK" ]]; then
            echo "::error::Webhook de deploy remoto nao configurado."
            exit 1
          fi
          curl --fail --show-error --silent -X POST "$SEGREDO_PDV_DEPLOY_WEBHOOK"

      - name: Subir aplicacao local para homologacao
        if: env.DEPLOY_REMOTO == 'false'
        shell: bash
        run: |
          JAR=$(ls build/libs/*.jar | head -n 1)
          nohup java -jar "$JAR" --spring.profiles.active=h2 --server.port=8080 > pdv-app.log 2>&1 &
          echo $! > pdv-app.pid

      - name: Registrar etapa de health check
        run: bash .github/scripts/registrar-etapa.sh "Aguardando aplicacao responder no health check"

      - name: Aguardar aplicacao
        run: bash .github/scripts/aguardar-aplicacao.sh "${PDV_BASE_URL}/actuator/health" 30 5

      - name: Registrar etapa de smoke tests
        run: bash .github/scripts/registrar-etapa.sh "Executando smoke tests HTTP"

      - name: Smoke test - health check publico
        run: curl --fail --show-error --silent "${PDV_BASE_URL}/actuator/health"

      - name: Smoke test - endpoint autenticado via Basic Auth
        # Credenciais via secrets (producao) ou fallback para dados de homologacao
        env:
          PDV_ADMIN_USER: ${{ secrets.PDV_ADMIN_USER }}
          PDV_ADMIN_PASS: ${{ secrets.PDV_ADMIN_PASS }}
        shell: bash
        run: |
          ADMIN_USER="${PDV_ADMIN_USER:-admin@pdv.com}"
          ADMIN_PASS="${PDV_ADMIN_PASS:-admin123}"
          curl --fail --show-error --silent \
            -u "${ADMIN_USER}:${ADMIN_PASS}" \
            "${PDV_BASE_URL}/api/integracao/resumo"

      - name: Registrar etapa de testes Selenium
        run: bash .github/scripts/registrar-etapa.sh "Iniciando testes pos-deploy com Selenium"

      - name: Testes Selenium pos-deploy
        env:
          PDV_BASE_URL: ${{ env.PDV_BASE_URL }}
          PDV_ADMIN_USER: ${{ secrets.PDV_ADMIN_USER }}
          PDV_ADMIN_PASS: ${{ secrets.PDV_ADMIN_PASS }}
          CI: 'true'
        run: gradle postDeployTest --stacktrace --warning-mode all

      - name: Registrar etapa de analise DAST
        run: bash .github/scripts/registrar-etapa.sh "Iniciando analise DAST com OWASP ZAP"

      - name: DAST com ZAP Baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.PDV_BASE_URL }}
          fail_action: false
          cmd_options: '-a'

      - name: Publicar logs e relatorios do deploy
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-deploy-${{ github.sha }}
          path: |
            pdv-app.log
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

      - name: Encerrar aplicacao local
        if: always() && env.DEPLOY_REMOTO == 'false'
        run: |
          if [[ -f pdv-app.pid ]]; then kill $(cat pdv-app.pid) || true; fi

      - name: Registrar conclusao do deploy
        if: always()
        run: bash .github/scripts/registrar-etapa.sh "Pipeline CD concluido"

      - name: Resumo do deploy staging
        if: always()
        run: |
          echo "## 🚀 CD — Deploy Staging \#${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Etapa | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Empacotamento JAR | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests HTTP | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Selenium pós-deploy | Executado |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST ZAP Baseline | Executado |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-producao:
    name: Deploy para producao (aprovacao manual)
    runs-on: ubuntu-latest
    needs: deploy-and-validate
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registrar deploy aprovado para producao
        run: bash .github/scripts/registrar-etapa.sh "Deploy aprovado manualmente para producao"

      - name: Deploy producao via webhook
        if: ${{ env.DEPLOY_WEBHOOK != '' }}
        env:
          DEPLOY_WEBHOOK: ${{ secrets.PDV_DEPLOY_WEBHOOK }}
        run: curl --fail --show-error --silent -X POST "$DEPLOY_WEBHOOK"

      - name: Resumo deploy producao
        if: always()
        run: |
          echo "## ✅ Deploy Produção — \#${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy aprovado manualmente e executado com sucesso." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\` — **Aprovado por:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
