name: Seguranca

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dependency-review:
    name: Revisao de dependencias
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Revisar dependencias do PR
        uses: actions/dependency-review-action@v4

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Configurar Gradle 8.12
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'
      - name: Build para analise do CodeQL
        run: gradle clean testClasses --stacktrace --warning-mode all
      - name: Analisar
        uses: github/codeql-action/analyze@v3
