# =============================================
# PDV - Ponto de Venda | Configuracao Principal
# =============================================

spring.application.name=ponto-de-venda

# Perfil ativo: h2 (desenvolvimento) ou mysql (producao)
spring.profiles.active=h2

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Internacionalizacao
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Robustez: timeouts do servidor
server.tomcat.connection-timeout=5000
server.tomcat.keep-alive-timeout=15000

# Seguranca: desabilita exposicao de erros detalhados ao usuario
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never

# Observabilidade
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
