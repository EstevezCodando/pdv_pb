<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(titulo='Erro', conteudo=~{::section})}">
<body>
<section>
    <div class="text-center py-5">
        <div class="mb-4">
            <i class="bi bi-exclamation-triangle-fill display-1" style="color: var(--pdv-highlight);"></i>
        </div>
        <h2 class="fw-bold mb-3" id="codigoErro">
            Erro <span th:text="${status ?: '500'}">500</span>
        </h2>
        <p class="lead text-muted mb-4" id="mensagemErro"
           th:text="${mensagem ?: 'Ocorreu um erro inesperado. Tente novamente mais tarde.'}">
            Erro inesperado.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/}" class="btn btn-pdv">
                <i class="bi bi-house-door me-1"></i>Voltar ao Inicio
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </button>
        </div>
    </div>
</section>
</body>
</html>
