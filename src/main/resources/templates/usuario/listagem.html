<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(titulo='Usuarios', conteudo=~{::section})}">
<body>
<section>
    <!-- Mensagens de feedback -->
    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show" role="alert" id="alertSucesso">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible fade show" role="alert" id="alertErro">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${mensagemErro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center py-3"
             style="background: var(--pdv-secondary);">
            <h4 class="mb-0 text-white">
                <i class="bi bi-people me-2"></i>Usuarios Cadastrados
            </h4>
            <a th:href="@{/usuarios/novo}" class="btn btn-pdv" id="btnNovo">
                <i class="bi bi-plus-lg me-1"></i>Novo Usuario
            </a>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(usuarios)}" class="text-center text-muted py-5" id="semRegistros">
                <i class="bi bi-inbox display-4 d-block mb-3"></i>
                Nenhum usuario cadastrado.
            </div>
            <div th:unless="${#lists.isEmpty(usuarios)}" class="table-responsive">
                <table class="table table-hover mb-0" id="tabelaUsuarios">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Status</th>
                        <th class="text-center">Acoes</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}" th:id="'usuario-' + ${u.id}">
                        <td th:text="${u.id}"></td>
                        <td th:text="${u.nome}"></td>
                        <td th:text="${u.email}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.perfil == 'ADMIN'} ? 'bg-primary' : 'bg-info text-dark'"
                                  th:text="${u.perfil}"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${u.ativo} ? 'badge-ativo' : 'badge-inativo'"
                                  th:text="${u.ativo} ? 'Ativo' : 'Inativo'"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-primary me-1 btn-editar"
                               th:title="'Editar ' + ${u.nome}">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <a th:href="@{/usuarios/excluir/{id}(id=${u.id})}"
                               class="btn btn-sm btn-outline-danger btn-excluir"
                               th:title="'Excluir ' + ${u.nome}">
                                <i class="bi bi-trash"></i> Excluir
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</section>
</body>
</html>
