<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(titulo, conteudo)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo} + ' | PDV'">PDV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        :root {
            --pdv-primary: #101c3d;
            --pdv-secondary: #17295d;
            --pdv-accent: #ef476f;
            --pdv-accent-dark: #d83f63;
            --pdv-muted: #667085;
            --pdv-surface: #f4f7fb;
            --pdv-card: #ffffff;
            --pdv-border: rgba(15, 23, 42, 0.08);
            --pdv-success: #1f9d63;
            --pdv-danger: #dc3545;
            --pdv-warning: #f59f00;
        }
        html, body { min-height: 100%; }
        body {
            background:
                radial-gradient(circle at top left, rgba(239, 71, 111, 0.08), transparent 24%),
                linear-gradient(180deg, #f7f9fc 0%, var(--pdv-surface) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #13203b;
        }
        .navbar {
            background: linear-gradient(135deg, var(--pdv-primary), var(--pdv-secondary)) !important;
            box-shadow: 0 12px 30px rgba(16, 28, 61, 0.18);
        }
        .navbar-brand { font-weight: 800; letter-spacing: 0.3px; }
        .nav-link {
            color: rgba(255,255,255,0.82) !important;
            border-radius: 10px;
            padding-inline: 12px !important;
            transition: all 0.18s ease;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff !important;
            background: rgba(255,255,255,0.1);
        }
        .card {
            border: 1px solid var(--pdv-border);
            border-radius: 20px;
            background: var(--pdv-card);
            box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
        }
        .card-header {
            border: none;
            border-radius: 20px 20px 0 0 !important;
        }
        .btn-pdv {
            background: linear-gradient(135deg, var(--pdv-accent), #ff5d79);
            border: none;
            color: #fff;
            font-weight: 700;
            border-radius: 12px;
        }
        .btn-pdv:hover {
            background: linear-gradient(135deg, var(--pdv-accent-dark), var(--pdv-accent));
            color: #fff;
        }
        .btn-outline-secondary, .btn-outline-light {
            border-radius: 12px;
        }
        .table th {
            background: #edf2fb;
            color: #213154;
            font-weight: 700;
            border-bottom: 1px solid rgba(15, 23, 42, 0.06);
        }
        .table td { vertical-align: middle; }
        .badge-ativo { background: rgba(31, 157, 99, 0.14); color: var(--pdv-success); }
        .badge-inativo { background: rgba(220, 53, 69, 0.14); color: var(--pdv-danger); }
        .page-intro {
            margin-bottom: 1.5rem;
        }
        .page-intro h1 {
            font-size: clamp(1.7rem, 2.5vw, 2.3rem);
            font-weight: 800;
            margin-bottom: 0.35rem;
        }
        .page-intro p {
            color: var(--pdv-muted);
            margin-bottom: 0;
        }
        .metric-card {
            padding: 1.25rem;
            height: 100%;
        }
        .metric-card .metric-title {
            color: var(--pdv-muted);
            font-size: 0.92rem;
            margin-bottom: 0.35rem;
        }
        .metric-card .metric-value {
            font-size: 1.9rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .form-control, .form-select {
            border-radius: 12px;
            min-height: 46px;
            border-color: rgba(15, 23, 42, 0.12);
        }
        .form-control:focus, .form-select:focus {
            border-color: rgba(239, 71, 111, 0.38);
            box-shadow: 0 0 0 0.25rem rgba(239, 71, 111, 0.12);
        }
        .alert { border: none; border-radius: 14px; }
        footer { color: #7c879a; font-size: 0.9rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-cart4 me-2"></i>PDV System
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto gap-lg-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${#strings.equals(titulo, 'Inicio')} ? 'active'">
                        <i class="bi bi-house-door me-1"></i>Inicio
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios}" th:classappend="${#strings.contains(titulo, 'Usuario')} ? 'active'">
                        <i class="bi bi-people me-1"></i>Usuarios
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/produtos}" th:classappend="${#strings.contains(titulo, 'Produto')} ? 'active'">
                        <i class="bi bi-box-seam me-1"></i>Produtos
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','OPERADOR')">
                    <a class="nav-link" th:href="@{/vendas}" th:classappend="${#strings.contains(titulo, 'Venda')} ? 'active'">
                        <i class="bi bi-receipt me-1"></i>Vendas
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center ms-lg-3 mt-3 mt-lg-0 gap-2" sec:authorize="isAuthenticated()">
                <span class="text-white-50 small">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">usuario</span>
                </span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-light">
                        <i class="bi bi-box-arrow-right me-1"></i>Sair
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container my-4 my-lg-5">
    <div th:replace="${conteudo}">Conteudo aqui</div>
</main>

<footer class="text-center py-4 mt-4">
    <p class="mb-0">PDV System &copy; 2025 - Plataforma integrada de ponto de venda.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.btn-excluir').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                if (!confirm('Tem certeza que deseja excluir este registro?')) {
                    e.preventDefault();
                }
            });
        });
    });
</script>
</body>
</html>
