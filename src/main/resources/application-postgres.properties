# Perfil Postgres - compatível com execucao local e Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pdvdb}
spring.datasource.username=${DB_USERNAME:pdvuser}
spring.datasource.password=${DB_PASSWORD:pdvpass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

server.port=${SERVER_PORT:8080}
pdv.security.remember-me.key=${PDV_REMEMBER_ME_KEY:pdv-remember-me-key}
